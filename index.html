<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Converter</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --border-color: #333333;
            --input-bg: #2c2c2c;
            --input-border: #444;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --danger-color: #cf6679;
            --btn-text: #ffffff;
            --scroll-track: #1e1e1e;
            --scroll-thumb: #555;
            --remove-btn-color: #888;
            --remove-btn-hover: #fff;
        }
        body.light-mode {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #cccccc;
            --input-bg: #ffffff;
            --input-border: #bbbbbb;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --danger-color: #dc3545;
            --btn-text: #ffffff;
            --scroll-track: #f1f1f1;
            --scroll-thumb: #888;
            --remove-btn-color: #999;
            --remove-btn-hover: #333;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        #theme-toggle:hover { background: var(--input-bg); }
        h1 { text-align: center; font-size: 20px; margin: 0 0 25px 0; font-weight: normal; }
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .section:last-child { border: none; padding-bottom: 0; margin-bottom: 0; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 240px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--text-sub); }
        input[type="text"], select, input[type="number"] {
            width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--input-border);
            color: var(--text-main); border-radius: 3px; box-sizing: border-box;
        }
        input[type="text"]:focus, select:focus, input[type="number"]:focus { outline: none; border-color: var(--primary-color); }
        .range-wrap { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--primary-color); }
        .dpi-input { width: 70px !important; text-align: right; }
        .option-group { margin-top: 5px; }
        .option-label { display: inline-flex; align-items: center; margin-right: 15px; font-size: 14px; cursor: pointer; margin-bottom: 5px; }
        .option-label input { margin-right: 5px; accent-color: var(--primary-color); }
        #drop-zone {
            border: 2px dashed var(--border-color); padding: 30px; text-align: center;
            background: rgba(128, 128, 128, 0.05); border-radius: 4px; cursor: pointer;
            margin-bottom: 15px; transition: background 0.2s;
        }
        #drop-zone:hover { background: rgba(128, 128, 128, 0.1); border-color: var(--primary-color); }
        #drop-zone p { margin: 0; font-size: 14px; }
        #file-list-container { display: none; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 3px; background: var(--input-bg); }
        #file-list { padding: 0; margin: 0; list-style: none; max-height: 200px; overflow-y: auto; }
        #file-list::-webkit-scrollbar { width: 8px; }
        #file-list::-webkit-scrollbar-track { background: var(--scroll-track); }
        #file-list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; border-bottom: 1px solid var(--border-color); font-size: 13px; cursor: grab;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background: rgba(255, 255, 255, 0.05); }
        .badge { padding: 2px 5px; border-radius: 3px; font-size: 10px; color: #fff; margin-right: 8px; font-weight: bold; }
        .badge-pdf { background: #d32f2f; }
        .badge-img { background: #1976d2; }
        .remove-btn {
            background: transparent; color: var(--remove-btn-color); border: none;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; margin-left: 10px; padding: 0; line-height: 1; transition: color 0.2s;
        }
        .remove-btn:hover { color: var(--remove-btn-hover); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; color: var(--btn-text); transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #run-btn { background: var(--primary-color); flex: 2; font-weight: bold; }
        #run-btn:disabled { background: var(--border-color); cursor: not-allowed; opacity: 0.6; }
        #stop-btn { background: var(--danger-color); display: none; flex: 2; }
        #reset-btn { background: #6c757d; flex: 1; max-width: 100px; }
        #progress-area { margin-top: 15px; display: none; }
        #progress-text { font-size: 12px; margin-bottom: 5px; text-align: left; }
        .progress-track { background: var(--border-color); height: 4px; border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-color); width: 0%; }
        #log-area {
            margin-top: 15px; max-height: 150px; overflow-y: auto; background: #000000;
            color: #ccc; padding: 10px; font-size: 12px; font-family: monospace; border: 1px solid var(--border-color);
        }
        body.light-mode #log-area { background: #f9f9f9; color: #333; }
        .log { margin-bottom: 2px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .processing { color: #2196f3; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 9999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(2px);
        }
        .modal-content {
            background: var(--container-bg); border: 1px solid var(--border-color); border-radius: 8px;
            width: 90%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column;
            padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); color: var(--text-main); box-sizing: border-box;
        }
        .modal-header { font-size: 18px; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .sort-container { flex: 1; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; }
        .sort-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .sort-item {
            background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 6px;
            padding: 8px; cursor: grab; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s, box-shadow 0.2s; position: relative;
        }
        .sort-item:hover { border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .sort-item:active { cursor: grabbing; }
        .sort-thumb { width: 100%; height: 140px; object-fit: contain; background: #333; border-radius: 4px; margin-bottom: 8px; }
        .page-info { font-size: 12px; color: var(--text-sub); text-align: center; word-break: break-all; }
        .modal-footer { margin-top: 15px; display: flex; justify-content: flex-end; gap: 15px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .modal-footer button { width: 140px; }
    </style>
</head>
<body>

<div class="container">
    <button id="theme-toggle" onclick="toggleTheme()">☀ Light Mode</button>
    <h1>PDF画像化＞再結合 ＆ 画像PDF結合ツール</h1>

    <div class="section">
        <div class="row">
            <div class="col">
                <label>変換形式</label>
                <select id="format" onchange="toggleJpeg()">
                    <option value="png">PNG (高画質)</option>
                    <option value="jpeg" selected>JPEG (軽量)</option>
                </select>
                <div id="jpeg-box" style="display:block; margin-top:10px;">
                    <label>品質 (0.1 - 1.0)</label>
                    <div class="range-wrap">
                        <input type="range" id="quality" min="0.1" max="1.0" step="0.1" value="1.0" oninput="document.getElementById('q-val').textContent=this.value">
                        <span id="q-val" style="width:30px; text-align:right;">1.0</span>
                    </div>
                </div>
            </div>
            <div class="col">
                <label>解像度 (DPI)</label>
                <div class="range-wrap">
                    <input type="range" id="dpi-slider" min="72" max="600" step="10" value="120">
                    <input type="number" id="dpi-number" value="120" min="1" step="10" class="dpi-input">
                </div>

                <div style="margin-top:15px;">
                    <label>画像結合時のサイズ調整</label>
                    <select id="img-resize-mode">
                        <option value="none" selected>そのまま (調整しない)</option>
                        <option value="min-width">最小の幅に合わせる</option>
                        <option value="min-height">最小の高さに合わせる</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="row">
            <div class="col">
                <label>保存オプション</label>
                <div class="option-group">
                    <label class="option-label">
                        <input type="checkbox" id="zip-check"> 完了後にZIPにまとめる
                    </label>
                    <label class="option-label" title="PDF生成前に全ページの並び順を手動で変更できます">
                        <input type="checkbox" id="sort-check"> 変換前にページの並び順を確認
                    </label>
                </div>
            </div>
            <div class="col">
                <label>保存先</label>
                <div class="option-group">
                    <label class="option-label">
                        <input type="radio" name="save-loc" value="download" checked> ダウンロード (標準)
                    </label>
                    <label class="option-label" title="対応ブラウザのみ">
                        <input type="radio" name="save-loc" value="folder"> フォルダ選択
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <label>ファイル名置換 (PDFのみ)</label>
        <div class="row">
            <div class="col"><input type="text" id="find-txt" placeholder="検索文字列"></div>
            <div class="col"><input type="text" id="replace-txt" placeholder="置換文字列"></div>
        </div>
    </div>

    <div class="section">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>PDF / 画像ファイルを選択</p>
            <input type="file" id="file-input" multiple accept="application/pdf, image/*" style="display:none">
        </div>
        <div id="file-list-container">
            <ul id="file-list"></ul>
        </div>
    </div>

    <div class="btn-group">
        <button id="run-btn" onclick="start()" disabled>変換開始</button>
        <button id="stop-btn" onclick="cancel()">中止</button>
        <button id="reset-btn" onclick="resetAll()">リセット</button>
    </div>

    <div id="progress-area">
        <div id="progress-text">待機中</div>
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
    <div id="log-area"></div>
</div>

<div id="sort-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span id="sort-title">ページの並び替え</span>
            <span style="font-size:12px; color:var(--text-sub)">ドラッグ＆ドロップで順序を変更</span>
        </div>
        <div class="sort-container">
            <div id="sort-grid" class="sort-grid"></div>
        </div>
        <div class="modal-footer">
            <button onclick="pageSorter.cancel()" style="background:var(--danger-color)">キャンセル</button>
            <button onclick="pageSorter.confirm()" style="background:var(--primary-color)">保存</button>
        </div>
    </div>
</div>

<script>
    // --- 設定定数 (Configuration Driven) ---
    const USER_SETTINGS = {
        pdfWorkerSrc: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js',
        pdfCMapUrl: 'https://unpkg.com/pdf.js-dist@3.11.174/cmaps/',
        thumbSize: 150,
        logSuccess: 'success',
        logError: 'error',
        logProcessing: 'processing',
        msgAborted: 'ABORTED',
        msgUserCancelled: 'USER_CANCELLED',
        msgZipSaving: '📦 ZIP作成中...',
        msgZipSaved: '✅ ZIP保存完了',
        msgZipDownload: '✅ ZIPダウンロード',
        msgZipError: '❌ 保存エラー: ',
        msgProcessingStart: '画像処理開始...',
        msgResizing: '画像サイズ解析中...',
        msgSavingData: '保存データ作成中...'
    };

    pdfjsLib.GlobalWorkerOptions.workerSrc = USER_SETTINGS.pdfWorkerSrc;

    // --- グローバルステート ---
    let fileQueue = [];
    let isProcessing = false;
    let abortCtrl = false;
    let sortable;

    // --- UI初期化 ---
    const dpiSlider = document.getElementById('dpi-slider');
    const dpiNumber = document.getElementById('dpi-number');
    dpiSlider.addEventListener('input', function() { dpiNumber.value = this.value; });
    dpiNumber.addEventListener('input', function() { dpiSlider.value = this.value; });

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('light-mode');
        btn.textContent = body.classList.contains('light-mode') ? '🌙 Dark Mode' : '☀ Light Mode';
    }

    function toggleJpeg() {
        document.getElementById('jpeg-box').style.display = document.getElementById('format').value === 'jpeg' ? 'block' : 'none';
    }

    function resetAll() {
        if (isProcessing) return alert("処理中はリセットできません");
        fileQueue = [];
        document.getElementById('file-input').value = '';
        document.getElementById('log-area').innerHTML = '';
        document.getElementById('progress-area').style.display = 'none';
        document.getElementById('find-txt').value = '';
        document.getElementById('replace-txt').value = '';
        updateList();
    }

    const handleFiles = (files) => {
        if (isProcessing) return;
        Array.from(files).forEach(f => {
            if (f.type === 'application/pdf' || f.type.startsWith('image/')) {
                fileQueue.push(f);
            }
        });
        updateList();
    };

    function updateList() {
        const listEl = document.getElementById('file-list');
        const runBtn = document.getElementById('run-btn');
        listEl.innerHTML = '';
        if (fileQueue.length > 0) {
            document.getElementById('file-list-container').style.display = 'block';
            runBtn.disabled = isProcessing;
            runBtn.textContent = `変換開始 (${fileQueue.length} ファイル)`;
            fileQueue.forEach((file, index) => {
                const item = document.createElement('li');
                item.className = 'file-item';
                item.dataset.index = index;
                const typeBadge = file.type === 'application/pdf'
                    ? '<span class="badge badge-pdf">PDF</span>'
                    : '<span class="badge badge-img">IMG</span>';
                item.innerHTML = `<span>${typeBadge}${file.name}</span><button class="remove-btn" onclick="removeFile(${index})" title="削除">×</button>`;
                listEl.appendChild(item);
            });
            if (sortable) sortable.destroy();
            sortable = new Sortable(listEl, {
                draggable: '.file-item',
                onUpdate: (evt) => {
                    const movedFile = fileQueue.splice(evt.oldIndex, 1)[0];
                    fileQueue.splice(evt.newIndex, 0, movedFile);
                },
                handle: '.file-item',
                cursor: 'grab',
                animation: 150
            });
        } else {
            document.getElementById('file-list-container').style.display = 'none';
            runBtn.disabled = true;
            runBtn.textContent = '変換開始';
            if (sortable) { sortable.destroy(); sortable = null; }
        }
    }

    function removeFile(index) {
        if (isProcessing) return;
        fileQueue.splice(index, 1);
        updateList();
    }

    const dropZone = document.getElementById('drop-zone');
    dropZone.ondragover = e => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary-color)'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = 'var(--border-color)'; };
    dropZone.ondrop = e => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border-color)';
        handleFiles(e.dataTransfer.files);
    };
    document.getElementById('file-input').onchange = e => handleFiles(e.target.files);
    document.getElementById('file-input').onclick = e => e.target.value = '';

    function cancel() {
        if (isProcessing) {
            abortCtrl = true;
            document.getElementById('stop-btn').textContent = "停止中...";
        }
    }

    function getTimestampFilename() {
        const now = new Date();
        return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}.pdf`;
    }

    // --- クラス定義: ページソーター ---
    class PageSorter {
        constructor() {
            this.modal = document.getElementById('sort-modal');
            this.grid = document.getElementById('sort-grid');
            this.title = document.getElementById('sort-title');
            this.resolve = null;
            this.reject = null;
            this.sortableInstance = null;
            this.items = [];
        }
        async open(items, fileName) {
            this.items = items;
            this.title.textContent = `並び替え ${fileName}`;
            this.grid.innerHTML = '';
            items.forEach((item) => {
                const el = document.createElement('div');
                el.className = 'sort-item';
                el.dataset.id = item.id;
                const img = document.createElement('img');
                img.src = item.thumb;
                img.className = 'sort-thumb';
                const info = document.createElement('div');
                info.className = 'page-info';
                info.innerText = item.label;
                el.appendChild(img);
                el.appendChild(info);
                this.grid.appendChild(el);
            });
            this.modal.style.display = 'flex';
            if (this.sortableInstance) this.sortableInstance.destroy();
            this.sortableInstance = new Sortable(this.grid, { animation: 150 });
            return new Promise((resolve, reject) => { this.resolve = resolve; this.reject = reject; });
        }
        confirm() {
            const newOrderIds = Array.from(this.grid.children).map(el => el.dataset.id);
            const sortedItems = newOrderIds.map(id => this.items.find(item => String(item.id) === id));
            this.close();
            if (this.resolve) this.resolve(sortedItems);
        }
        cancel() {
            this.close();
            if (this.reject) this.reject(new Error(USER_SETTINGS.msgUserCancelled));
        }
        close() {
            this.modal.style.display = 'none';
            this.grid.innerHTML = '';
            if (this.sortableInstance) { this.sortableInstance.destroy(); this.sortableInstance = null; }
        }
    }
    const pageSorter = new PageSorter();

    // --- 画像処理ヘルパー ---
    function getImageSize(file, config) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const scale = config.dpi / 72;
                resolve({ width: Math.max(1, Math.floor(img.width * scale)), height: Math.max(1, Math.floor(img.height * scale)) });
            };
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    function imageFileToDataUrl(file, config, canvas, ctx, thumbnailWidth = null, targetW = null, targetH = null) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                let targetWidth, targetHeight;
                if (targetW && targetH) {
                    targetWidth = targetW;
                    targetHeight = targetH;
                } else if (thumbnailWidth) {
                    const ratio = thumbnailWidth / img.width;
                    targetWidth = thumbnailWidth;
                    targetHeight = Math.max(1, Math.floor(img.height * ratio));
                } else {
                    const scale = config.dpi / 72;
                    targetWidth = Math.max(1, Math.floor(img.width * scale));
                    targetHeight = Math.max(1, Math.floor(img.height * scale));
                }
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.clearRect(0, 0, targetWidth, targetHeight);
                ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                const outType = thumbnailWidth ? 'image/jpeg' : (config.format === 'jpeg' ? 'image/jpeg' : 'image/png');
                const outQuality = thumbnailWidth ? 0.5 : (config.format === 'jpeg' ? config.quality : undefined);
                resolve({ data: canvas.toDataURL(outType, outQuality), width: targetWidth, height: targetHeight });
            };
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    // --- メイン処理 ---
    async function start() {
        if (fileQueue.length === 0) return;
        const useZip = document.getElementById('zip-check').checked;
        const saveLoc = document.querySelector('input[name="save-loc"]:checked').value;
        let dirHandle = null;
        if (saveLoc === 'folder') {
            if (!('showDirectoryPicker' in window)) alert("このブラウザはフォルダ選択に対応していません。");
            else { try { dirHandle = await window.showDirectoryPicker({ mode: "readwrite" }); } catch (err) { return; } }
        }
        isProcessing = true;
        abortCtrl = false;
        document.getElementById('run-btn').disabled = true;
        document.getElementById('run-btn').textContent = "処理中...";
        document.getElementById('stop-btn').style.display = 'inline-block';
        document.getElementById('stop-btn').textContent = "中止";
        document.getElementById('reset-btn').disabled = true;
        document.getElementById('progress-area').style.display = 'block';
        document.getElementById('log-area').innerHTML = '';
        const config = {
            format: document.getElementById('format').value,
            quality: parseFloat(document.getElementById('quality').value),
            dpi: parseInt(document.getElementById('dpi-number').value) || 120,
            find: document.getElementById('find-txt').value,
            replace: document.getElementById('replace-txt').value,
            imgResizeMode: document.getElementById('img-resize-mode').value
        };
        const zip = useZip ? new JSZip() : null;
        const pdfFiles = fileQueue.filter(f => f.type === 'application/pdf');
        const imgFiles = fileQueue.filter(f => f.type.startsWith('image/'));
        for (let i = 0; i < pdfFiles.length; i++) {
            if (abortCtrl) break;
            try {
                const { data, fileName } = await processPdf(pdfFiles[i], config, useZip);
                await handleSave(data, fileName, useZip, zip, dirHandle);
                addLog(`✅ [PDF] ${fileName}`, USER_SETTINGS.logSuccess);
            } catch (err) {
                if (err.message === USER_SETTINGS.msgAborted || err.message === USER_SETTINGS.msgUserCancelled) addLog(`⛔ ${pdfFiles[i].name} 中断`, USER_SETTINGS.logError);
                else addLog(`❌ ${pdfFiles[i].name} エラー: ${err.message}`, USER_SETTINGS.logError);
            }
        }
        if (imgFiles.length > 0 && !abortCtrl) {
            try {
                const timestampName = getTimestampFilename();
                const { data, fileName } = await processImagesToPdf(imgFiles, config, timestampName, useZip);
                await handleSave(data, fileName, useZip, zip, dirHandle);
                addLog(`✅ [結合] ${fileName}`, USER_SETTINGS.logSuccess);
            } catch (err) {
                if (err.message === USER_SETTINGS.msgAborted || err.message === USER_SETTINGS.msgUserCancelled) addLog(`⛔ 中断`, USER_SETTINGS.logError);
                else addLog(`❌ 画像結合エラー: ${err.message}`, USER_SETTINGS.logError);
            }
        }
        if (useZip && !abortCtrl && (pdfFiles.length > 0 || imgFiles.length > 0)) {
            addLog(USER_SETTINGS.msgZipSaving, USER_SETTINGS.logProcessing);
            const content = await zip.generateAsync({type:"blob"});
            const zipName = `converted_${getTimestampFilename().replace('.pdf','.zip')}`;
            if (dirHandle) {
                try {
                    const fileHandle = await dirHandle.getFileHandle(zipName, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    addLog(USER_SETTINGS.msgZipSaved, USER_SETTINGS.logSuccess);
                } catch(e) { addLog(USER_SETTINGS.msgZipError + e.message, USER_SETTINGS.logError); }
            } else { saveAsFile(content, zipName); addLog(USER_SETTINGS.msgZipDownload, USER_SETTINGS.logSuccess); }
        }
        finishProcess();
    }

    async function handleSave(data, fileName, useZip, zip, dirHandle) {
        if (useZip) zip.file(fileName, data);
        else {
            if (dirHandle) {
                const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(data);
                await writable.close();
            } else saveAsFile(data, fileName);
        }
    }

    function finishProcess() {
        isProcessing = false;
        document.getElementById('run-btn').disabled = false;
        document.getElementById('run-btn').textContent = "変換開始";
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('reset-btn').disabled = false;
        updateProgress(0, "完了");
        setTimeout(() => { if(!isProcessing) document.getElementById('progress-area').style.display = 'none'; }, 3000);
        updateList();
    }

    function updateProgress(percent, text) {
        const bar = document.getElementById('progress-bar');
        bar.style.width = Math.floor(percent) + "%";
        document.getElementById('progress-text').textContent = text;
    }

    function saveAsFile(blob, fileName) {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        setTimeout(() => { document.body.removeChild(link); URL.revokeObjectURL(link.href); }, 100);
    }

    function addLog(msg, type) {
        const div = document.createElement('div');
        div.className = `log ${type}`;
        div.textContent = msg;
        const log = document.getElementById('log-area');
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    async function processImagesToPdf(files, config, outFileName, forZip) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const sortEnabled = document.getElementById('sort-check').checked;
        let processList = files.map((f, i) => ({ file: f, originalIndex: i }));
        if (sortEnabled) {
            updateProgress(0, "プレビュー作成中...");
            let thumbItems = [];
            for (let i = 0; i < files.length; i++) {
                if (abortCtrl) throw new Error(USER_SETTINGS.msgAborted);
                const thumbData = await imageFileToDataUrl(files[i], null, canvas, ctx, USER_SETTINGS.thumbSize);
                thumbItems.push({ id: i, thumb: thumbData.data, label: files[i].name, originalData: files[i] });
            }
            try {
                const sortedItems = await pageSorter.open(thumbItems, "＞画像結合");
                processList = sortedItems.map(item => ({ file: item.originalData, originalIndex: item.id }));
            } catch (e) { throw e; }
        }
        let minWidth = Infinity;
        let minHeight = Infinity;
        let imageSizes = [];
        if (config.imgResizeMode !== 'none') {
            updateProgress(0, USER_SETTINGS.msgResizing);
            for (let i = 0; i < processList.length; i++) {
                if (abortCtrl) throw new Error(USER_SETTINGS.msgAborted);
                const sizeInfo = await getImageSize(processList[i].file, config);
                minWidth = Math.min(minWidth, sizeInfo.width);
                minHeight = Math.min(minHeight, sizeInfo.height);
                imageSizes.push(sizeInfo);
            }
        }
        updateProgress(0, USER_SETTINGS.msgProcessingStart);
        const { jsPDF } = window.jspdf;
        let newPdf = null;
        for (let i = 0; i < processList.length; i++) {
            if (abortCtrl) throw new Error(USER_SETTINGS.msgAborted);
            let targetW = null;
            let targetH = null;
            if (config.imgResizeMode === 'min-width') {
                const ratio = minWidth / imageSizes[i].width;
                targetW = minWidth;
                targetH = Math.max(1, Math.floor(imageSizes[i].height * ratio));
            } else if (config.imgResizeMode === 'min-height') {
                const ratio = minHeight / imageSizes[i].height;
                targetW = Math.max(1, Math.floor(imageSizes[i].width * ratio));
                targetH = minHeight;
            }
            updateProgress(((i) / processList.length) * 100, `画像処理中 (${i + 1}/${processList.length})`);
            const imgInfo = await imageFileToDataUrl(processList[i].file, config, canvas, ctx, null, targetW, targetH);
            const isLandscape = imgInfo.width > imgInfo.height;
            if (newPdf === null) {
                newPdf = new jsPDF({ unit: 'pt', format: [imgInfo.width, imgInfo.height], orientation: isLandscape ? 'l' : 'p', compress: true });
                newPdf.addImage(imgInfo.data, null, 0, 0, imgInfo.width, imgInfo.height);
            } else {
                newPdf.addPage([imgInfo.width, imgInfo.height], isLandscape ? 'l' : 'p');
                newPdf.addImage(imgInfo.data, null, 0, 0, imgInfo.width, imgInfo.height);
            }
        }
        updateProgress(100, USER_SETTINGS.msgSavingData);
        return { data: forZip ? newPdf.output('arraybuffer') : newPdf.output('blob'), fileName: outFileName };
    }

    async function processPdf(file, config, forZip) {
        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer, cMapUrl: USER_SETTINGS.pdfCMapUrl, cMapPacked: true, enableXfa: true }).promise;
        const total = pdfDoc.numPages;
        const sortEnabled = document.getElementById('sort-check').checked;
        let pageOrder = Array.from({length: total}, (_, i) => i + 1);
        if (sortEnabled) {
            updateProgress(0, "ページ構成解析中...");
            let thumbItems = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            for (let num = 1; num <= total; num++) {
                if (abortCtrl) throw new Error(USER_SETTINGS.msgAborted);
                const page = await pdfDoc.getPage(num);
                const viewportRaw = page.getViewport({ scale: 1.0 });
                const thumbScale = USER_SETTINGS.thumbSize / viewportRaw.width;
                const viewport = page.getViewport({ scale: thumbScale });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport }).promise;
                thumbItems.push({ id: num, thumb: canvas.toDataURL('image/jpeg', 0.5), label: `P.${num}`, originalData: num });
                if (num % 5 === 0) await new Promise(r => setTimeout(r, 0));
            }
            try {
                const sortedItems = await pageSorter.open(thumbItems, file.name);
                pageOrder = sortedItems.map(item => item.originalData);
            } catch (e) { throw e; }
        }
        const { jsPDF } = window.jspdf;
        let newPdf = null;
        const scale = config.dpi / 72;
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        for (let i = 0; i < pageOrder.length; i++) {
            const pageNum = pageOrder[i];
            if (abortCtrl) throw new Error(USER_SETTINGS.msgAborted);
            updateProgress(((i) / total) * 100, `${file.name} 処理中 (${i + 1}/${total})`);
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: scale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport }).promise;
            const imgType = config.format === 'jpeg' ? 'image/jpeg' : 'image/png';
            const imgData = canvas.toDataURL(imgType, config.format === 'jpeg' ? config.quality : undefined);
            const isLandscape = viewport.width > viewport.height;
            if (newPdf === null) {
                newPdf = new jsPDF({ unit: 'pt', format: [viewport.width, viewport.height], orientation: isLandscape ? 'l' : 'p', compress: true });
                newPdf.addImage(imgData, null, 0, 0, viewport.width, viewport.height);
            } else {
                newPdf.addPage([viewport.width, viewport.height], isLandscape ? 'l' : 'p');
                newPdf.addImage(imgData, null, 0, 0, viewport.width, viewport.height);
            }
            canvas.width = 1; canvas.height = 1;
        }
        updateProgress(100, USER_SETTINGS.msgSavingData);
        let outName = file.name.replace(/\.pdf$/i, '');
        if (config.find) outName = outName.split(config.find).join(config.replace);
        outName += ".pdf";
        return { data: forZip ? newPdf.output('arraybuffer') : newPdf.output('blob'), fileName: outName };
    }
</script>
